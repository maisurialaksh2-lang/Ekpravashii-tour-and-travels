<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up | Holidays Tours and Travels</title>
    <link rel="stylesheet" href="holiday.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">

    <div class="auth-container">
        <div class="auth-logo">Holidays<span>Tours</span></div>
        
        <div class="tabs">
            <div class="tab active" id="tab-login" onclick="toggleForm('login')">Login</div>
            <div class="tab" id="tab-signup" onclick="toggleForm('signup')">Sign Up</div>
        </div>

        <!-- Login Form -->
        <form class="login-form" id="login-form" onsubmit="event.preventDefault(); window.location.href='index.html';">
            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="email" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-auth">Login to Continue</button>
            <div class="extra-links">
                <label style="cursor: pointer;"><input type="checkbox" style="margin-right: 5px;"> Remember Me</label>
                <a href="#">Forgot Password?</a>
            </div>
        </form>

        <!-- Sign Up Form -->
        <form class="signup-form" id="signup-form" onsubmit="event.preventDefault(); window.location.href='index.html';">
            <div class="form-group">
                <i class="fas fa-user"></i>
                <input type="text" placeholder="Full Name" required>
            </div>
            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="email" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Create Password" required>
            </div>
            <button type="submit" class="btn-auth">Create Account</button>
        </form>
    </div>

    <script>
        function toggleForm(type) {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const tabLogin = document.getElementById('tab-login');
            const tabSignup = document.getElementById('tab-signup');

            if(type === 'login') {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
                tabLogin.classList.add('active');
                tabSignup.classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
                tabLogin.classList.remove('active');
                tabSignup.classList.add('active');
            }
        }
    </script>
</body>
</html>
